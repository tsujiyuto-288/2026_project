{% extends 'base.html' %} {% block content %}

<div>
  <div class="mb-4">
    <h1 class="h2"><i class="bi bi-diagram-3 me-2"></i>工程一覧</h1>
  </div>
  <div class="card">
    <div class="card-header py-3">
      <h2 class="m-0 h4">工程一覧</h2>
    </div>
    <div class="card-body">
      <table id="process_table" class="table table-striped table-hober w-100">
        <thead>
          <tr>
            <th>工程番号</th>
            <th>工程名</th>
          </tr>
        </thead>
        <tbody>
          <tr></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

{% endblock content %} {% block extra_js %}
<script>
  $(document).ready(function () {
    const url = "{% url 'process_list' %}";
    const table = new DataTable("#process_table", {
      ajax: {
        url: url,
        type: "POST",
        data: {
          kubun: "get_item",
        },
        headers: { "X-CSRFToken": "{{ csrf_token }}" },
      },
      columns: [
        { data: "process_number", className: "text-start" },
        { data: "process_name", className: "text-start" },
      ],
      language: {
        url: "https://cdn.datatables.net/plug-ins/1.13.7/i18n/ja.json",
      },
    });
  });
</script>

{% endblock extra_js %}
