<div class="modal fade" id="order_edit_modal">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">編集</h5>
        <button
          type="button"
          class="btn-close close_order_edit_modal_btn"
        ></button>
      </div>
      <div class="modal-body">
        <div class="row">
          <div class="col-md-6">
            <div class="m-2">
              <label>品番</label>
              <input class="form-control" />
            </div>
            <div class="m-2">
              <label>品名</label>
              <input class="form-control" />
            </div>
            <div class="m-3">
              <div class="h-50 d-flex align-items-center">
                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="edit_provisional_order"
                  />
                  <label class="form-check-label" for="edit_provisional_order">
                    仮受注</label
                  >
                </div>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="m-2">
              <label>単価</label>
              <input class="form-control" />
            </div>
            <div class="m-2">
              <label>注番</label>
              <input class="form-control" />
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="btn btn-secondary mx-3 close_order_edit_modal_btn"
        >
          閉じる
        </button>
        <button type="button" class="btn btn-primary mx-3">編集</button>
      </div>
    </div>
  </div>
</div>
