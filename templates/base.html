      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"

    <style>
      :root {
        --sidebar-width: 280px;
      }
      .sidebar {
        width: var(--sidebar-width);
        min-height: 100vh;
        background-color: #ffffffcc;
        border-right: 2px solid #444;
        position: fixed;
      }
      .sidebar .container {
        padding: 10px 15px;
        border-bottom: 1px solid #333;
      }

      .sidebar .nav {
        flex-direction: column;
        padding-top: 20px;
      }

      .sidebar .nav-link {
        color: #333;
        font-size: 1.25rem;
        padding: 0.8rem 1.5rem;
        border-radius: 0.5rem;
        margin: 5px 20px;
      }

      .sidebar .nav-link:hover {
        background-color: rgb(176, 195, 255);
        margin: 5px 20px;
      }

      .sidebar .nav-link-active {
        background-color: rgb(62, 107, 253);
        color: #ebebeb;
        margin: 5px 20px;
      }

      .main-content {
        width: calc(100% - var(--sidebar-width));
        margin-left: var(--sidebar-width);
        padding: 2rem;
      }

      body {
        color: #333;
        background-color: #ebebeb;
      }
    </style>

  <body class="d-flex">
    <div class="sidebar">
      <div class="container">

      </div>
      <ul class="nav nav-pills">

        </li>
        <li class="nav-item">
          <a
            class="nav-link d-dlex justify-content-between align-items-center mb-0"
            data-bs-toggle="collapse"
            href="#basicInfoCollapse"
          >
            <span><i class="bi bi-info-square-fill me-2"></i>基本情報</span>
            <i class="bi bi-chevron-down mx-2"></i>
          </a>
          <div class="collapse" id="basicInfoCollapse">
            <ul class="list-unstyled ms-3">
              <li class="nav-item">
                <a href="{% url 'item_register' %}" class="nav-link">
                  <span><i class="bi bi-circle me-2"></i>品番登録</span>
                </a>
              </li>

              <li class="nav-item">
                <a href="{% url 'process_list' %}" class="nav-link">
                  <span><i class="bi bi-circle me-2"></i>工程登録</span>
                </a>
              </li>

              <li class="nav-item">
                <a href="{% url 'employee' %}" class="nav-link">
                  <span><i class="bi bi-circle me-2"></i>作業者登録</span>
                </a>
              </li>
            </ul>
          </div>
          <a
            class="nav-link d-dlex justify-content-between align-items-center mb-0"
            data-bs-toggle="collapse"
            href="#basicInfoCollapse-2"
          >
            <span><i class="bi bi-tools me-2"></i>操作</span>
            <i class="bi bi-chevron-down mx-2"></i>
          </a>
          <div class="collapse" id="basicInfoCollapse-2">
            <ul class="list-unstyled ms-3">
              <li class="nav-item">
                <a href="{% url 'order_input' %}" class="nav-link">
                  <span><i class="bi bi-circle me-2"></i>受注入力</span>
                </a>
              </li>
              <li class="nav-item">
                <a href="{% url 'progress_input' %}" class="nav-link">
                  <span><i class="bi bi-circle me-2"></i>進捗登録</span>
                </a>
              </li>
            </ul>
          </div>
          <a
            class="nav-link d-dlex justify-content-between align-items-center mb-0"
            data-bs-toggle="collapse"
            href="#basicInfoCollapse-3"
          >
            <span><i class="bi bi-search me-2"></i>情報確認</span>
            <i class="bi bi-chevron-down mx-2"></i>
          </a>
          <div class="collapse" id="basicInfoCollapse-3">
            <ul class="list-unstyled ms-3">
              <li class="nav-item">
                <a href="{% url 'shipping_list' %}" class="nav-link">
                  <span><i class="bi bi-circle me-2"></i>出荷一覧</span>

              </li>
            </ul>
          </div>
        </li>

    <main class="main-content">{% block content %}{% endblock content %}</main>

    <!--ここからJS-->

    <!-- JQuery -->
    <script
      src="https://code.jquery.com/jquery-3.7.1.js"

      crossorigin="anonymous"
    ></script>
    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
      crossorigin="anonymous"
    ></script>
    <!-- Bootstrap datatable 1 -->
    <script src="https://cdn.datatables.net/2.1.8/js/dataTables.js"></script>
    <!-- Bootstrap datatable 2 -->
    <script src="https://cdn.datatables.net/2.1.8/js/dataTables.bootstrap5.js"></script>
    <!-- select2 -->
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <!--jQuery ContextMenu-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-contextmenu/2.9.2/jquery.contextMenu.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-contextmenu/2.9.2/jquery.ui.position.js"></script>
    <!--jQuery Lobibox-->
    <script src="https://cdn.jsdelivr.net/npm/lobibox@1.2.7/dist/js/lobibox.min.js"></script>
    <!--SortableJS-->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <!--サイドバーでアクティブなものに色をつける-->
    <script>
      $(document).ready(function () {
        const path = window.location.pathname;
        $(".sidebar")
          .find(".nav-link")
          .each(function () {
            if ($(this).attr("href") === path) {
              $(this).addClass("nav-link-active");
              $(this).closest(".collapse").addClass("show");
              //ダッシュボードは親アコーディオンがないのでアイコンを変えたりしない。
              if (path !== "{% url 'dashbord' %}") {
                $(this).find("i").removeClass("bi-circle");
                $(this).find("i").addClass("bi-record-circle");
              }
            }
          });
      });
    </script>

    <!--ヘルパー関数たち-->
    <script>
      //モーダルをfadeInしてくれる関数
      function showModalFadeIn(modalId) {
        $(modalId)
          .css({
            display: "flex",
            opacity: 0,
          })
          .animate({
            opacity: 1,
          });
      }
      //lobibox 成功通知
      function LobiboxSuccess(message) {
        Lobibox.notify("success", {
          position: "top right",
          msg: message,
          icon: "bi bi-check-circle-fill",
          title: "成功",
        });
      }

      //lobibox 失敗通知
      function LobiboxError(message) {
        Lobibox.notify("error", {
          position: "top right",
          msg: message,
          icon: "bi bi-x-circle-fill",
          title: "失敗",
        });
      }

      // 指定した親要素内の入力値（input, select等）をオブジェクトとして取得する
      function getFieldValues($fieldID) {
        console.log("test");
        const fields = {};
        $($fieldID)
          .find("input,select")
          .each(function () {
            switch ($(this).prop("type")) {
              case "checkbox":
                fields[$(this).data("id")] = $(this).prop("checked");
                break;
              default:
                fields[$(this).data("id")] = $(this).val();
            }
          });
        return fields;
      }

      // 指定した親要素内の入力値（input, select等）の入力欄を全て空にする
      function resetFieldValues($fieldID) {
        $($fieldID)
          .find("input,select")
          .each(function () {
            switch ($(this).prop("type")) {
              case "checkbox":
                $(this).prop("checked", false);
                break;
              default:
                $(this).val("");
            }
          });
      }

      // 指定した親要素内の入力値をセットする。
      // fieldObjectは各入力フォームのdata-idをキーに持つオブジェクト
      function setFieldValues($fieldID, fieldObject) {
        $($fieldID)
          .find("input,select")
          .each(function () {
            switch ($(this).prop("type")) {
              case "checkbox":
                $(this).prop("checked", fieldObject[$(this).data("id")]);
                break;
              case "select-one":
                $(this).val(fieldObject[$(this).data("id")]).trigger("change");
                break;
              default:
                $(this).val(fieldObject[$(this).data("id")]);
            }
          });
      }
    </script>

    <!--汎用的な固定の変数-->
    <script>
      const DataTable_language =
        "https://cdn.datatables.net/plug-ins/1.13.7/i18n/ja.json";

      const CSRF_HEADER = { "X-CSRFToken": "{{ csrf_token }}" };
    </script>

    {% block extra_js %}{% endblock extra_js %}
  </body>
</html>
